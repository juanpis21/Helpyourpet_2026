<!-- PRELOADER ANIMADO POST-LOGIN -->
<div *ngIf="showPreloader" class="preloader-overlay" [class.fade-out]="preloaderFadingOut">
  <div class="preloader-content">
    <!-- Círculos orbitales decorativos -->
    <div class="orbital-ring ring-1"></div>
    <div class="orbital-ring ring-2"></div>
    <div class="orbital-ring ring-3"></div>

    <!-- Logo central con patita -->
    <div class="preloader-logo">
      <div class="paw-container">
        <i class="fas fa-paw paw-icon"></i>
      </div>
    </div>

    <!-- Texto de bienvenida -->
    <div class="preloader-text">
      <h2 class="welcome-title">¡Bienvenido!</h2>
      <p class="welcome-subtitle">Preparando tu experiencia...</p>
    </div>

    <!-- Barra de progreso -->
    <div class="progress-bar-container">
      <div class="progress-bar-fill"></div>
    </div>

    <!-- Huellas decorativas flotantes -->
    <div class="floating-paws">
      <i class="fas fa-paw float-paw p1"></i>
      <i class="fas fa-paw float-paw p2"></i>
      <i class="fas fa-paw float-paw p3"></i>
      <i class="fas fa-paw float-paw p4"></i>
      <i class="fas fa-paw float-paw p5"></i>
      <i class="fas fa-paw float-paw p6"></i>
    </div>
  </div>
</div>

<div class="login-container">

    <!-- LADO IZQUIERDO -->
    <div class="left">

        <!-- IMAGEN -->
        <img src="assets/images/fondoinicio.png" class="Mascotas">

        <!-- TEXTO ENCIMA -->
        <div class="overlay">
            <h1>Helpyourpet</h1>
            <p>Cuidamos a quienes más amas</p>
        </div>

    </div>

    <!-- LINEA DIVISORA -->
    <div class="vertical-divider"></div>

    <!-- LADO DERECHO -->
    <div class="right">

        <div class="form-box" (keyup.enter)="onSubmit()">
            <div class="titulo">Iniciar sesión</div>

            <input 
                type="text" 
                placeholder="Correo electrónico o celular" 
                [(ngModel)]="credentials.username"
                name="username"
                [disabled]="isLoading"
                required
            >
            <input 
                type="password" 
                placeholder="Contraseña" 
                [(ngModel)]="credentials.password"
                name="password"
                [disabled]="isLoading"
                required
            >

            <button 
                type="button"
                class="login-btn" 
                (click)="onSubmit()"
                [disabled]="isLoading"
            >
                {{ isLoading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
            </button>

            <a class="forgot" routerLink="/recovery">¿Olvidaste tu contraseña?</a>

            <div class="divider"></div>

            <button class="register-btn" routerLink="/register">
                Crear cuenta nueva
            </button>

        </div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
        <p>&copy; 2024 Helpyourpet - Todos los derechos reservados</p>
    </div>

</div>
